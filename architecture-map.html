<html lang="en">
<head>

  <style>
    :root {
      --bg: #0F0F0F;
      --panel: #161616;
      --panel-2: #1c1c1c;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #8a8a8a;
      --client: #4ea1ff;
      --route: #7bd389;
      --service: #c792ea;
      --db: #ffb86b;
      --external: #ff6b9d;
      --critical: #ff3860;

    * { box-sizing: border-box; }
    body {

      overflow: hidden;

      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

    .app {

      grid-template-columns: minmax(0, 1fr) 360px;
      height: 100vh;

    .stage {
      position: relative;
      min-width: 0;
      background:

        radial-gradient(circle at 88% 82%, rgba(255, 184, 107, 0.08), transparent 26%),

    }
    header {
      position: absolute;
      z-index: 3;
      left: 14px;
      right: 14px;
      top: 12px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      pointer-events: none;
    }
    .title {
      max-width: 720px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(22, 22, 22, 0.88);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
      pointer-events: auto;

    h1 { margin: 0 0 4px; font-size: 18px; letter-spacing: 0; }
    .subtitle { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      max-width: 720px;
      pointer-events: auto;
    }
    button.chip, button.zoom {
      border: 1px solid var(--border);
      color: var(--text);
      background: rgba(28, 28, 28, 0.9);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    button.chip.active {
      border-color: var(--accent);
      color: #111;
      background: var(--accent);
    }
    .zoomBox { display: flex; gap: 6px; }
    svg { width: 100%; height: 100%; display: block; cursor: grab; }
    svg.dragging { cursor: grabbing; }
    .cluster rect {
      fill: rgba(28,28,28,0.62);
      stroke: var(--border);
      stroke-width: 1;
      rx: 18;
    }
    .cluster text {
      fill: var(--muted);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .edgePath {
      fill: none;
      stroke-width: 1.7;
      opacity: 0.50;
    }
    .edgeLabel {
      fill: #d7d7d7;
      font-size: 11px;
      paint-order: stroke;
      stroke: #0F0F0F;
      stroke-width: 4px;
      stroke-linejoin: round;
    }
    .node rect.main {
      fill: rgba(22,22,22,0.96);
      stroke-width: 1.5;
      rx: 10;
      filter: drop-shadow(0 10px 22px rgba(0,0,0,0.25));
    }
    .node.critical rect.main { stroke-width: 2.2; }
    .node text.label {
      fill: var(--text);
      font-size: 13px;
      font-weight: 800;
    }
    .node text.sub {
      fill: var(--muted);
      font-size: 11px;
    }
    .node text.pathHint {
      fill: #b8b8b8;
      font-size: 10px;
    }
    .badgeText { fill: #111; font-size: 10px; font-weight: 900; text-anchor: middle; dominant-baseline: central; }
    .fixBadge { fill: #7bd389; }
    .bugBadge { fill: #ff3860; }
    .dim { opacity: 0.16; }
    .hide { display: none; }
    aside {
      height: 100vh;
      overflow: auto;
      border-left: 1px solid var(--border);
      background: linear-gradient(180deg, var(--panel), #101010);
      padding: 18px;
    }
    .sideSection {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--panel-2);
      padding: 14px;
      margin-bottom: 12px;
    }
    .sideSection h2, .sideSection h3 {
      margin: 0 0 8px;
      font-size: 14px;
    }
    .sideSection p, .sideSection li {
      color: #c8c8c8;
      font-size: 12px;
      line-height: 1.55;
    }
    .sideSection ul { margin: 8px 0 0; padding-left: 17px; }
    .meta {
      display: inline-block;
      margin: 3px 5px 3px 0;
      padding: 3px 7px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-size: 11px;
    }
    .legendRow {
      display: grid;
      grid-template-columns: 16px 1fr;
      gap: 8px;
      align-items: center;
      margin: 7px 0;
      color: #cfcfcf;
      font-size: 12px;
    }
    .swatch { width: 14px; height: 3px; border-radius: 999px; }
    code {
      color: #f6d48a;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 1px 4px;
      font-size: 11px;
    }
  </style>
</head>

    <div class="sideSection">
      <h3>Critical path</h3>
      <p>Dashboard route -> plant context shell -> risk workspace page -> frontend API facade -> FastAPI v1 router -> signal-engine route -> get_risk_workspace -> rule engine -> inventory and shipment continuity -> exposure, graph, timeline, and PostgreSQL-backed events.</p>
    </div>
    <div class="sideSection">
      <h3>Legend</h3>
      <div class="legendRow"><span class="swatch" style="background:var(--critical)"></span><span>Critical path</span></div>
      <div class="legendRow"><span class="swatch" style="background:var(--accent-2)"></span><span>HTTP or external API call</span></div>
      <div class="legendRow"><span class="swatch" style="background:var(--db)"></span><span>Database read/write</span></div>
      <div class="legendRow"><span class="swatch" style="background:var(--client)"></span><span>Route mount or client navigation</span></div>
      <div class="legendRow"><span class="swatch" style="background:#8a8a8a"></span><span>Normal function/data flow</span></div>
    </div>
  `;
}
function showNode(id, transient) {
  const n = nodeById.get(id);
  const fixes = FIXES[id] || [];
  const bugs = KNOWN_BUGS[id] || [];
  sidebar.innerHTML = `
    <div class="sideSection">
      <h2>${escapeHtml(n.label)}</h2>
      <span class="meta">${escapeHtml(n.cluster)}</span>
      ${n.critical ? '<span class="meta">critical path</span>' : ''}
      ${(n.tag || []).filter(t => t !== 'all').map(t => `<span class="meta">${escapeHtml(t)}</span>`).join('')}
      <p><strong>Role:</strong> ${escapeHtml(n.role)}</p>
      <p><strong>Plain English:</strong> ${escapeHtml(n.plain)}</p>
      <p><strong>Path:</strong> <code>${escapeHtml(n.path)}</code></p>
    </div>
    <div class="sideSection">
      <h3>Concrete notes</h3>
      <ul>${n.notes.map(note => `<li>${escapeHtml(note)}</li>`).join('')}</ul>
    </div>
    <div class="sideSection">
      <h3>Incoming edges</h3>
      ${edgeList(incoming(id), true)}
    </div>
    <div class="sideSection">
      <h3>Outgoing edges</h3>
      ${edgeList(outgoing(id), false)}
    </div>
    ${fixes.length ? `<div class="sideSection"><h3>Fix opportunities</h3><ul>${fixes.map(f => `<li>${escapeHtml(f.t)}</li>`).join('')}</ul></div>` : ''}
    ${bugs.length ? `<div class="sideSection"><h3>Known bugs</h3><ul>${bugs.map(b => `<li>${escapeHtml(b.sev)}: ${escapeHtml(b.t)}</li>`).join('')}</ul></div>` : ''}
    ${transient ? '<div class="sideSection"><p>Hover preview. Click the node to pin this detail.</p></div>' : ''}
  `;
}
function edgeList(list, incomingMode) {
  if (!list.length) return '<p>No edges.</p>';
  return `<ul>${list.map(e => {
    const other = nodeById.get(incomingMode ? e.from : e.to);
    return `<li><code>${escapeHtml(e.kind)}</code> ${escapeHtml(e.label)} ${incomingMode ? 'from' : 'to'} ${escapeHtml(other ? other.label : 'unknown')}</li>`;
  }).join('')}</ul>`;
}
function shortPath(path) {
  if (!path) return '';
  const parts = path.split('/');
  return parts.length > 3 ? parts.slice(-3).join('/') : path;
}
function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function fit() {
  const minX = Math.min(...clusters.map(c => c.x));
  const minY = Math.min(...clusters.map(c => c.y));
  const maxX = Math.max(...clusters.map(c => c.x + c.w));
  const maxY = Math.max(...clusters.map(c => c.y + c.h));
  const rect = svg.getBoundingClientRect();
  const sx = (rect.width - 40) / (maxX - minX);
  const sy = (rect.height - 120) / (maxY - minY);
  transform.s = Math.min(sx, sy);
  transform.x = 20 - minX * transform.s;
  transform.y = 104 - minY * transform.s;
  applyTransform();
}
document.getElementById('fit').onclick = fit;
document.getElementById('zoomIn').onclick = () => { transform.s *= 1.16; applyTransform(); };
document.getElementById('zoomOut').onclick = () => { transform.s /= 1.16; applyTransform(); };
svg.addEventListener('click', () => { selectedId = null; updateFocus(); showDefault(); });
let dragging = false, last = null;
svg.addEventListener('pointerdown', e => {
  dragging = true;
  last = { x: e.clientX, y: e.clientY };
  svg.setPointerCapture(e.pointerId);
  svg.classList.add('dragging');
});
svg.addEventListener('pointermove', e => {
  if (!dragging) return;
  transform.x += e.clientX - last.x;
  transform.y += e.clientY - last.y;
  last = { x: e.clientX, y: e.clientY };
  applyTransform();
});
svg.addEventListener('pointerup', e => {
  dragging = false;
  last = null;
  svg.releasePointerCapture(e.pointerId);
  svg.classList.remove('dragging');
});
svg.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = svg.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const before = { x: (mx - transform.x) / transform.s, y: (my - transform.y) / transform.s };
  const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  transform.s = Math.max(0.25, Math.min(2.6, transform.s * factor));
  transform.x = mx - before.x * transform.s;
  transform.y = my - before.y * transform.s;
  applyTransform();
}, { passive: false });

render();
fit();
  </script>
</body>
</html>
